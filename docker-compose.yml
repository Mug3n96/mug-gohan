services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json:ro
    depends_on:
      ollama:
        condition: service_healthy

  # Ollama – Option A: local container (default)
  # Not needed if you use Option B (direct ollama.com API via OLLAMA_HOST=https://ollama.com).
  # In that case, remove the ollama service and the depends_on block in backend above.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

    # NVIDIA GPU support (uncomment if available):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

    # AMD GPU support (uncomment if available):
    # devices:
    #   - /dev/kfd:/dev/kfd
    #   - /dev/dri:/dev/dri

volumes:
  ollama_data:

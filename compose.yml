services:
  backend:
    build: ./backend
    image: mug3n96/mug-gohan:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
      - ./config.json:/app/config.json:ro
    depends_on:
      ollama:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Ollama – Option A: local container (default)
  # ---------------------------------------------------------------------------
  # Remove this service and the depends_on block in backend to use Option B instead.
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Ollama – Option B: ollama.com cloud API (no local container)
  # ---------------------------------------------------------------------------
  # No Ollama container needed. Set in .env:
  #   OLLAMA_HOST=https://ollama.com
  #   OLLAMA_MODEL=gemma4:31b-cloud
  #   OLLAMA_API_KEY=your-api-key   # from ollama.com/settings/keys
  # Also remove the ollama service above and the depends_on block in backend.

  # Whisper – optional voice transcription (enables mic button in chat)
  # Uncomment this service and set WHISPER_URL=http://whisper:9000 in your .env to enable.
  # Remove WHISPER_URL or leave it empty to disable voice input entirely.
  whisper:
    image: onerahmet/openai-whisper-asr-webservice:latest
    restart: unless-stopped
    environment:
      - ASR_MODEL=base        # tiny / base / small / medium / large
      - ASR_ENGINE=openai_whisper

volumes:
  ollama_data:
